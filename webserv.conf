

	server {
		listen 8080;
		client_max_body_size 10M;

		error_page 404 /errors/404.html;
		error_page 500 /errors/500.html;

		location / {
			methods GET POST;

			root /var/www/html;
			index index.html;

			autoindex off;

			upload off;
		}

		location /images {
			methods GET;

			root /var/www/images;

			autoindex on;

			index index.html;

			upload off;
		}

		location /upload {
			methods POST;

			root /var/www/uploads;

			autoindex off;

			index index.html;

			upload on;
			upload_store /var/www/uploads;
		}

		location /old-page {
			methods GET;

			return 301 /new-page;
		}

		location /cgi-bin {
			methods GET POST;

			root /var/www/cgi-bin;

			autoindex off;

			index index.cgi;

			cgi_extension .cgi;
			cgi_path /usr/bin/python3;
		}
	}

