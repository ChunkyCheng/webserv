<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found - Page Missing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: hsl(222, 47%, 11%);
            --card-bg: hsla(223, 47%, 16%, 0.6);
            --border-color: hsla(223, 47%, 30%, 0.4);
            --text-primary: hsl(210, 40%, 98%);
            --text-secondary: hsl(215, 20%, 65%);
            --accent-gradient: linear-gradient(135deg, hsl(230, 85%, 60%) 0%, hsl(180, 85%, 50%) 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Abstract ambient background glow */
        body::before {
            content: '';
            position: absolute;
            width: 40vw;
            height: 40vw;
            border-radius: 50%;
            background: var(--accent-gradient);
            filter: blur(120px);
            opacity: 0.15;
            z-index: 0;
            top: 20%;
            right: 10%;
            animation: floatGlow 8s ease-in-out infinite alternate;
        }

        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-50px, -30px) scale(1.1); }
        }

        .container {
            z-index: 10;
            width: 90%;
            max-width: 580px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            transform: translateY(0);
            animation: fadeIn 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon-container {
            position: relative;
            display: inline-block;
            margin-bottom: 24px;
        }

        .compass-icon {
            width: 80px;
            height: 80px;
            fill: none;
            stroke: url(#accentGradient);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 15px rgba(39, 137, 245, 0.4));
        }

        h1 {
            font-size: 8rem;
            font-weight: 800;
            line-height: 1;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: -2px;
            filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.3));
        }

        h2 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: var(--text-secondary);
            margin-bottom: 36px;
            font-weight: 300;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            color: var(--text-primary);
            background: var(--accent-gradient);
            padding: 14px 36px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(39, 137, 245, 0.4);
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(39, 137, 245, 0.6);
        }

        .btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <!-- SVG Gradient Definitions -->
    <svg style="width:0;height:0;position:absolute;" aria-hidden="true" focusable="false">
        <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="hsl(230, 85%, 60%)" />
            <stop offset="100%" stop-color="hsl(180, 85%, 50%)" />
        </linearGradient>
    </svg>

    <div class="container">
        <div class="icon-container">
            <svg class="compass-icon" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10"></circle>
                <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon>
            </svg>
        </div>
        <h1>404</h1>
        <h2>Lost in the Void</h2>
        <p>The page you are looking for doesn't exist, was deleted, or took a trip to an alternative reality. Let's get you back on track.</p>
        <a href="/" class="btn">Return Home</a>
    </div>
</body>
</html>
