<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hornet's Letterbox - Webserv</title>
    <!-- Modern Outfit Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #08080c;
            --card-bg: rgba(18, 14, 20, 0.75);
            --accent-primary: #e62232; /* Hornet's Crimson Dress */
            --accent-secondary: #cbd5e1; /* Pale Ore / Silk Needle */
            --danger: #b91c1c; /* Crimson Shadow */
            --text-main: #f1f5f9; /* Pale White */
            --text-muted: #94a3b8; /* Silken Grey */
            --border: rgba(230, 34, 50, 0.12); /* Subtle Crimson Borders */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(rgba(8, 8, 12, 0.88), rgba(8, 8, 12, 0.88)),
                url('./images/background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            width: 100%;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 40%, var(--accent-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }

        .back-btn {
            padding: 10px 20px;
            background: rgba(230, 34, 50, 0.04);
            border: 1px solid var(--border);
            color: var(--text-main);
            text-decoration: none;
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .back-btn:hover {
            background: rgba(230, 34, 50, 0.12);
            border-color: var(--accent-primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(230, 34, 50, 0.15);
        }

        .grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            gap: 30px;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: minmax(0, 1fr);
            }
        }

        .panel {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            backdrop-filter: blur(16px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
            border-radius: 24px 24px 0 0;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Drag & Drop Upload Zone */
        .dropzone {
            border: 2px dashed rgba(230, 34, 50, 0.25);
            border-radius: 16px;
            padding: 45px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(230, 34, 50, 0.01);
            position: relative;
        }

        .dropzone:hover, .dropzone.dragover {
            border-color: var(--accent-primary);
            background: rgba(230, 34, 50, 0.05);
            box-shadow: inset 0 0 15px rgba(230, 34, 50, 0.1);
        }

        .dropzone svg {
            width: 52px;
            height: 52px;
            stroke: var(--text-muted);
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .dropzone:hover svg {
            stroke: var(--accent-primary);
            transform: scale(1.08) translateY(-3px);
            filter: drop-shadow(0 2px 8px rgba(230, 34, 50, 0.3));
        }

        .dropzone p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 8px;
        }

        .dropzone span {
            color: var(--accent-primary);
            font-weight: 600;
        }

        #file-input {
            display: none;
        }

        /* Upload Progress / Status */
        .status-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            font-size: 0.95rem;
            display: none;
            word-break: break-all;
            animation: fadeIn 0.3s ease;
        }

        .status-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #34d399;
        }

        .status-error {
            background: rgba(230, 34, 50, 0.1);
            border: 1px solid rgba(230, 34, 50, 0.2);
            color: #f87171;
        }

        /* File List */
        .file-list {
            max-height: 400px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-right: 5px;
        }

        .file-list::-webkit-scrollbar {
            width: 6px;
        }

        .file-list::-webkit-scrollbar-thumb {
            background: rgba(230, 34, 50, 0.2);
            border-radius: 10px;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(230, 34, 50, 0.06);
            border-radius: 12px;
            padding: 14px 18px;
            transition: all 0.3s ease;
        }

        .file-item:hover {
            background: rgba(230, 34, 50, 0.04);
            border-color: rgba(230, 34, 50, 0.2);
            transform: translateX(4px);
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 12px;
            overflow: hidden;
            min-width: 0;
        }

        .file-icon {
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .file-name {
            font-weight: 500;
            color: #f1f5f9;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .file-name:hover {
            color: var(--accent-primary);
            text-decoration: underline;
            filter: drop-shadow(0 0 2px rgba(230, 34, 50, 0.4));
        }

        .delete-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .delete-btn:hover {
            background: rgba(230, 34, 50, 0.12);
        }

        .delete-btn svg {
            width: 18px;
            height: 18px;
            stroke: var(--text-muted);
            transition: all 0.2s ease;
        }

        .delete-btn:hover svg {
            stroke: var(--accent-primary);
            filter: drop-shadow(0 0 4px rgba(230, 34, 50, 0.5));
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 40px 0;
            font-size: 0.95rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Hornet's Letterbox</h1>
            <a href="/" class="back-btn">← Back to Showcases</a>
        </header>

        <div class="grid">
            <!-- Upload Panel -->
            <div class="panel">
                <h2>
                    <!-- Envelope / Letter Icon -->
                    <svg style="width:24px;height:24px;stroke:var(--accent-primary);fill:none" viewBox="0 0 24 24" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                    </svg>
                    Send a Letter
                </h2>
                <div class="dropzone" id="dropzone" onclick="document.getElementById('file-input').click()">
                    <!-- Sealed Envelope Graphic -->
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
                    </svg>
                    <p>Drop your sealed letter here, or <span>browse</span></p>
                    <p style="font-size: 0.8rem; opacity: 0.7;">Delivering directly to Hornet via C++ POST</p>
                    <input type="file" id="file-input" onchange="handleFileSelect(event)">
                </div>
                <div class="status-box" id="status-box"></div>
            </div>

            <!-- Management / Delete Panel -->
            <div class="panel">
                <h2>
                    <!-- Mailbox / Archive Icon -->
                    <svg style="width:24px;height:24px;stroke:var(--accent-secondary);fill:none" viewBox="0 0 24 24" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
                    </svg>
                    Hornet's Mailbox
                </h2>
                <div class="file-list" id="file-list">
                    <!-- Loaded dynamically -->
                    <div class="empty-state">Opening Hornet's mailbox...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Trigger drag events on dropzone
        const dropzone = document.getElementById('dropzone');
        
        ['dragenter', 'dragover'].forEach(eventName => {
            dropzone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropzone.classList.add('dragover');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropzone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropzone.classList.remove('dragover');
            }, false);
        });

        dropzone.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            const files = dt.files;
            if (files.length > 0) {
                uploadFile(files[0]);
            }
        });

        function handleFileSelect(event) {
            const files = event.target.files;
            if (files.length > 0) {
                uploadFile(files[0]);
            }
        }

        // Upload file via POST to /uploads
        async function uploadFile(file) {
            const statusBox = document.getElementById('status-box');
            statusBox.style.display = 'none';

            const formData = new FormData();
            formData.append("file", file, file.name);

            try {
                const response = await fetch('/uploads', {
                    method: 'POST',
                    body: formData
                });

                if (response.status === 201 || response.status === 200) {
                    showStatus(`Letter successfully delivered to Hornet! ("${file.name}")`, 'success');
                    fetchFiles(); // Reload file list
                } else if (response.status === 413) {
                    showStatus(`Delivery failed: Letter is too heavy for Hornet's weavers (Payload Too Large)!`, 'error');
                } else {
                    showStatus(`Delivery failed with status code ${response.status}`, 'error');
                }
            } catch (error) {
                // Any aborted connection (like a size-limit reset) throws a "Failed to fetch" network exception.
                // This lets us handle server hang-ups 100% dynamically without inputing any size limits
                showStatus(`Delivery failed: The server closed the connection (Failed to fetch). This usually happens when the letter is too heavy or a network issue occurred. Please reload the page to send a lighter letter.`, 'error');
                
                // Disable the dropzone and lock the UI so they must reload
                const dropzone = document.getElementById('dropzone');
                dropzone.onclick = null;
                dropzone.style.opacity = '0.5';
                dropzone.style.cursor = 'not-allowed';
                dropzone.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="stroke: var(--accent-primary)">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
                    </svg>
                    <p style="color: var(--accent-primary); font-weight: 700; font-size: 1.1rem; margin-bottom: 5px;">Connection Closed</p>
                    <p style="font-size: 0.85rem; color: var(--text-muted);">The connection was lost. Please reload the page to reconnect.</p>
                `;
            }
        }

        function showStatus(message, type) {
            const statusBox = document.getElementById('status-box');
            statusBox.textContent = message;
            statusBox.className = `status-box status-${type}`;
            statusBox.style.display = 'block';
        }

        // Helper to get file emojis (Hornet / Letter theme)
        function getFileEmoji(fileName) {
            const ext = fileName.split('.').pop().toLowerCase();
            if (['png', 'jpg', 'jpeg', 'gif', 'svg', 'webp'].includes(ext)) return '🖼️'; // Picture of Hornet/Hallownest
            if (['txt', 'pdf', 'doc', 'docx', 'md'].includes(ext)) return '📜'; // Scroll / Letter
            if (['zip', 'rar', 'tar', 'gz', '7z'].includes(ext)) return '📦'; // Package / Gift
            return '✉️'; // Standard Letter
        }

        // Fetch autoindex of /uploads/ and extract filenames
        async function fetchFiles() {
            const listContainer = document.getElementById('file-list');
            
            try {
                const response = await fetch('/uploads/');
                if (!response.ok) {
                    throw new Error(`Failed to load directory index (HTTP ${response.status})`);
                }

                const htmlText = await response.text();
                
                // Parse the autoindex HTML using DOMParser
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlText, 'text/html');
                const links = doc.querySelectorAll('a');
                
                const files = [];
                links.forEach(link => {
                    const href = link.getAttribute('href');
                    const text = link.textContent.trim();
                    
                    // Filter out parent directories and standard autoindex navigation
                    if (href && !href.startsWith('..') && text !== '../' && text !== 'Name' && text !== 'Last modified' && text !== 'Size') {
                        // Extract filename from href path
                        const parts = href.split('/');
                        const filename = parts.pop() || parts.pop();
                        if (filename) {
                            files.push(filename);
                        }
                    }
                });

                listContainer.innerHTML = '';

                if (files.length === 0) {
                    listContainer.innerHTML = '<div class="empty-state">No letters delivered to Hornet yet.</div>';
                    return;
                }

                files.forEach(file => {
                    const item = document.createElement('div');
                    item.className = 'file-item';
                    
                    const emoji = getFileEmoji(file);
                    
                    // Trim filename in the middle if it is longer than 24 chars
                    const displayName = file.length > 24 
                        ? file.substring(0, 12) + '...' + file.substring(file.length - 8) 
                        : file;
                    
                    item.innerHTML = `
                        <div class="file-info">
                            <span class="file-icon">${emoji}</span>
                            <a href="/uploads/${file}" target="_blank" class="file-name" title="Click to view / download ${file}">${displayName}</a>
                        </div>
                        <button class="delete-btn" onclick="deleteFile('${file}')" title="Recall Letter">
                            <!-- Recall / Needle Scissors Icon -->
                            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                    `;
                    listContainer.appendChild(item);
                });

            } catch (error) {
                listContainer.innerHTML = `<div class="empty-state" style="color: var(--accent-primary)">Error loading mailbox: ${error.message}</div>`;
            }
        }

        // Recall letter via DELETE to /uploads/filename
        async function deleteFile(fileName) {
            if (!confirm(`Are you sure you want to recall and burn your letter "${fileName}"?`)) {
                return;
            }

            try {
                const response = await fetch(`/uploads/${fileName}`, {
                    method: 'DELETE'
                });

                if (response.status === 204 || response.status === 200) {
                    // Force refresh
                    fetchFiles();
                } else {
                    alert(`Failed to recall letter. Server returned HTTP ${response.status}`);
                }
            } catch (error) {
                alert(`Network error during recall: ${error.message}`);
            }
        }

        // Initial fetch
        fetchFiles();
    </script>
</body>
</html>
